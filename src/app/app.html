<main class="page-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">MP</div>
      <div class="brand-copy">
        <p class="brand-name">{{ title }}</p>
        <p class="brand-tag">Login, register, and manage meetings.</p>
      </div>
    </div>
    <div class="top-actions">
      <ng-container *ngIf="service.user$ | async as user; else authTabs">
        <div class="profile-chip">
          <img *ngIf="(user.profilePictureUrl || user.avatarUrl || user.picture || user.profilePicture) as avatar" [src]="avatar" alt="avatar" class="avatar" />
          <div>
            <strong>Welcome, {{ user.name || user.email }}</strong>
            <div class="profile-email">{{ user.email }}</div>
          </div>
          <div class="profile-actions">
            <label class="upload-label">
              <input type="file" accept="image/*" (change)="onProfilePictureSelected($event)" />
              Change
            </label>
            <button class="button button-secondary" type="button" (click)="service.logout()" [disabled]="service.logoutLoading">Logout</button>
          </div>
        </div>
      </ng-container>
      <ng-template #authTabs>
        <button type="button" class="pill-button" (click)="setMode('login')" [class.active]="service.authMode === 'login'">Login</button>
        <button type="button" class="pill-button" (click)="setMode('register')" [class.active]="service.authMode === 'register'">Register</button>
      </ng-template>
    </div>
  </header>

  <div *ngIf="service.message$ | async as msg" class="status-message form-alert" [ngClass]="{ 'success': (service.messageType$ | async) === 'success', 'error': (service.messageType$ | async) === 'error' }" aria-live="polite" role="status">
    <span class="alert-icon" aria-hidden="true">!</span>
    <p>{{ msg }}</p>
    <button type="button" class="close-button" aria-label="Close status message" (click)="service.clearAlerts()">×</button>
  </div>

  <section class="interface-grid">
    <ng-container *ngIf="!(service.user$ | async); else loggedIn">
      <app-auth [mode]="service.authMode"></app-auth>
      <article class="panel info-card">
        <h3>Login or register to manage meetings</h3>
        <p>Once authenticated, you can create new meetings and view your meeting list here.</p>
      </article>
    </ng-container>

    <ng-template #loggedIn>
      <article class="panel status-panel">
        <app-meeting-form></app-meeting-form>
      </article>
    </ng-template>
  </section>

  <app-meeting-list *ngIf="service.user$ | async"></app-meeting-list>
</main>
